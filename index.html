<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Manaswi</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,600&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(circle at center, #16102b 0%, #07040d 100%);
        color: #f3f4f6;
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      :root {
        --gold: #f3cd82;
        --gold-glow: rgba(243, 205, 130, 0.5);
        --magic-pink: rgba(244, 114, 182, 0.4);
      }

      .stars-container,
      #fireworks-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .stars-container { z-index: 1; }
      #fireworks-canvas { z-index: 6; }

      /* INTRO */
      #intro-overlay {
        position: fixed;
        inset: 0;
        background: #07040d;
        z-index: 100;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 1.2s ease;
        padding: 20px;
      }

      .intro-top-text {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 1.8rem;
        color: var(--gold);
        text-align: center;
        opacity: 0;
        animation: fadeIn 2s ease forwards;
      }

      .intro-daisy {
        width: 130px;
        height: 130px;
        transform: scale(0);
        animation: bloom 2.5s ease forwards;
      }

      .intro-btn {
        margin-top: 50px;
        padding: 0.9rem 2.8rem;
        border-radius: 50px;
        border: 1px solid var(--gold);
        background: rgba(243,205,130,0.1);
        color: white;
        cursor: pointer;
      }

      @keyframes bloom {
        to { transform: scale(1); opacity: 1; }
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      /* WRAPPER */
      .wrapper {
        position: relative;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 5;
        padding: 40px;
        opacity: 0;
        transition: opacity 1s ease;
      }

      .slide {
        position: absolute;
        max-width: 620px;
        width: 100%;
        opacity: 0;
        transform: scale(0.95);
        pointer-events: none;
        transition: 0.8s ease;
        text-align: center;
      }

      .slide.active {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
        position: relative;
      }

      .title {
        font-family: "Playfair Display", serif;
        font-size: 2.6rem;
        color: var(--gold);
        margin-bottom: 1.5rem;
      }

      /* ✅ FIXED MESSAGE BOX (GLOBAL CLEAN VERSION) */
      .message-box {
        background: rgba(22, 14, 38, 0.22);
        border: 1px solid rgba(243, 205, 130, 0.15);
        border-radius: 24px;
        padding: 2.2rem 2.8rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.35),
          inset 0 0 15px rgba(244,114,182,0.05);
        backdrop-filter: blur(8px);
        width: 100%;
      }

      .message {
        font-size: 1.05rem;
        line-height: 1.8;
        color: #e5e7eb;
      }

      .signature {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        cursor: pointer;
        margin-top: 1rem;
      }

      .next-btn {
        margin-top: 1rem;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        border: 1px solid var(--gold);
        background: rgba(7,4,13,0.7);
        color: white;
        cursor: pointer;
      }

    </style>
  </head>

  <body>

    <!-- KEEP YOUR ORIGINAL HTML CONTENT EXACTLY SAME -->
    <!-- intro-overlay, stars, butterflies, slides, scripts etc remain unchanged -->

  </body>
</html>
